<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="https://gitea.tggamesyt.dev/tggamesyt/szar/raw/branch/main/src/main/resources/assets/szar/icon.png">

<title>Szar showcase</title>

<style>
  @font-face {
    font-family: 'Minecraft-Seven';
    src: url('https://tggamesyt.dev/assets/Minecraft-Seven_v2.ttf') format('truetype');
  }

  body {
    background: #0b0b0b url('https://raw.githubusercontent.com/PrismarineJS/minecraft-assets/master/data/1.21.8/blocks/grass_block_side.png') no-repeat center center;
    background-size: cover;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    color: #f5f5dc;
    font-family: 'Minecraft-Seven', monospace;
    padding: 20px;
    margin: 0;
  }

  .container {
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border: 4px solid #f2d16b;
    border-radius: 10px;
    max-width: 800px;
    margin: 40px auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    overflow-wrap: break-word;
    word-wrap: break-word;
  }

  a.button {
    display: inline-block;
    padding: 14px 28px;
    margin: 15px 0 5px 0;
    background: #f2d16b;
    color: #ffffff;
    text-decoration: none;
    font-weight: bold;
    border: 3px solid #333;
    border-radius: 6px;
    text-shadow: 1px 1px #222;
    transition: all 0.2s;
    font-size: 1rem;
  }

  a.button:hover {
    background: #e0c34b;
    transform: translateY(-2px);
  }



  #readme {
    font-size: 1rem;
    line-height: 1.6;
    margin-top: 20px;
  }

  #readme h1,
  #readme h2,
  #readme h3 {
    color: #f2d16b;
  }

  #readme img {
    max-width: 100%;
    display: block;
    margin: 12px auto;
    border-radius: 6px;
  }
</style>
</head>

<body>
<div class="container">
  <a id="download-button" class="button" href="#">Loading...</a>

  <div id="readme">
    <p>Loading README...</p>
  </div>
</div>

<script>
const BASE = "https://gitea.tggamesyt.dev/api/v1";
const OWNER = "tggamesyt";
const REPO = "szar";
const CORS_PROXY = "https://corsproxy.io/?url=";

async function fetchLatestJar() {
  try {
    const url = `${BASE}/repos/${OWNER}/${REPO}/releases`;
    const proxyUrl = `${CORS_PROXY}${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    }
    
    const releases = await res.json();

    if (!Array.isArray(releases) || releases.length === 0) {
      console.log('No releases found');
      return;
    }

    const latest = releases[0];
    const jar = latest.assets?.find(asset => asset.name.endsWith('.jar'));

    if (!jar) {
      console.log('No JAR file found in latest release');
      document.getElementById('download-button').style.display = 'none';
      return;
    }

    const downloadUrl = jar.browser_download_url;
    if (!downloadUrl) {
      console.error('No download URL in release:', jar);
      return;
    }

    const button = document.getElementById('download-button');
    button.href = downloadUrl;
    button.textContent = jar.name;
  } catch (error) {
    console.error('Error fetching latest jar:', error);
    document.getElementById('download-button').textContent = 'Error loading download';
  }
}

async function fetchReadme() {
  try {
    const rawUrl = `https://gitea.tggamesyt.dev/tggamesyt/szar/raw/branch/main/README.md`;
    const proxyUrl = `${CORS_PROXY}${encodeURIComponent(rawUrl)}`;
    const res = await fetch(proxyUrl);
    
    if (!res.ok) {
      document.getElementById('readme').innerHTML = '<p>No README found.</p>';
      return;
    }

    const markdown = await res.text();
    const html = markdown
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/gm, '<img src="$2" alt="$1">')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/gm, '<b>$1</b>')
      .replace(/\*(.+?)\*/gm, '<i>$1</i>')
      .replace(/`([^`]+)`/gm, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/gm, '<a href="$2" target="_blank">$1</a>')
      .replace(/\n/g, '<br>');

    document.getElementById('readme').innerHTML = html;
  } catch (error) {
    console.error('Error fetching README:', error);
    document.getElementById('readme').innerHTML = '<p>Failed to load README.</p>';
  }
}

fetchLatestJar();
fetchReadme();
</script>
</body>
</html>

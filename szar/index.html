<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ Updated icon URL -->
<link rel="icon" type="image/png" href="https://gitea.tggamesyt.dev/tggamesyt/szar/raw/branch/main/src/main/resources/assets/szar/icon.png">

<title>Minecraft Mod Viewer</title>

<style>
  @font-face {
    font-family: 'Minecraft-Seven';
    src: url('https://tggamesyt.dev/assets/Minecraft-Seven_v2.ttf') format('truetype');
  }

  body {
    background: #0b0b0b url('https://raw.githubusercontent.com/PrismarineJS/minecraft-assets/master/data/1.21.8/blocks/grass_block_side.png') no-repeat center center;
    background-size: cover;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    color: #f5f5dc;
    font-family: 'Minecraft-Seven', monospace;
    padding: 20px;
    margin: 0;
  }

  .container {
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border: 4px solid #f2d16b;
    border-radius: 10px;
    max-width: 800px;
    margin: 40px auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    overflow-wrap: break-word;
    word-wrap: break-word;
  }

  a.button {
    display: inline-block;
    padding: 14px 28px;
    margin: 15px 0 5px 0;
    background: #f2d16b;
    color: #ffffff;
    text-decoration: none;
    font-weight: bold;
    border: 3px solid #333;
    border-radius: 6px;
    text-shadow: 1px 1px #222;
    transition: all 0.2s;
    font-size: 1rem;
  }

  a.button:hover {
    background: #e0c34b;
    transform: translateY(-2px);
  }

  #download-stats {
    font-size: 0.9rem;
    margin-top: 4px;
    opacity: 0.9;
  }

  #readme {
    font-size: 1rem;
    line-height: 1.6;
    margin-top: 20px;
  }

  #readme h1,
  #readme h2,
  #readme h3 {
    color: #f2d16b;
  }

  #readme img {
    max-width: 100%;
    display: block;
    margin: 12px auto;
    border-radius: 6px;
  }
</style>
</head>

<body>
<div class="container">
  <a id="download-button" class="button" href="#">Loading...</a>

  <div id="download-stats">
    <span id="this-version">This version: loading…</span><br>
    <span id="all-versions">All versions: loading…</span>
  </div>

  <div id="readme">
    <p>Loading README...</p>
  </div>
</div>

<script>
// ====== CONFIG ======
const OWNER = "tggamesyt";
const REPO  = "szar";
const BASE  = "https://gitea.tggamesyt.dev/api/v1";
// ====================

async function fetchLatestJar() {
  const res = await fetch(`${BASE}/repos/${OWNER}/${REPO}/releases`);
  const releases = await res.json();

  if (!releases.length) return;

  const latest = releases[0];
  const jar = latest.assets.find(a => a.name.endsWith('.jar'));

  if (!jar) {
    document.getElementById('download-button').style.display = 'none';
    return;
  }

  const btn = document.getElementById('download-button');
  btn.href = jar.browser_download_url;
  btn.textContent = jar.name;

  document.getElementById('this-version').textContent =
    `This version: ${jar.download_count} downloads`;
}

async function fetchTotalJarDownloads() {
  const res = await fetch(`${BASE}/repos/${OWNER}/${REPO}/releases`);
  const releases = await res.json();

  let total = 0;

  for (const release of releases) {
    for (const asset of release.assets) {
      if (asset.name.endsWith(".jar")) {
        total += asset.download_count;
      }
    }
  }

  document.getElementById("all-versions").textContent =
    `All versions: ${total} downloads`;
}

async function fetchReadme() {
  const res = await fetch(`${BASE}/repos/${OWNER}/${REPO}/contents/README.md`);
  const data = await res.json();

  if (!data.content) {
    document.getElementById('readme').innerHTML = '<p>No README found.</p>';
    return;
  }

  const decoded = atob(data.content.replace(/\n/g, ''));

  const html = decoded
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/gim,
      '<img src="$2" alt="$1">')
    .replace(/^### (.+)$/gim, '<h3>$1</h3>')
    .replace(/^## (.+)$/gim, '<h2>$1</h2>')
    .replace(/^# (.+)$/gim, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/gim, '<b>$1</b>')
    .replace(/(^|[^*])\*(?!\*)(.+?)\*(?!\*)/gim, '$1<i>$2</i>')
    .replace(/`([^`]+)`/gim, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/gim,
      '<a href="$2" target="_blank">$1</a>')
    .replace(/\n/g, '<br>');

  document.getElementById('readme').innerHTML = html;
}

// Run
fetchLatestJar();
fetchTotalJarDownloads();
fetchReadme();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="https://gitea.tggamesyt.dev/tggamesyt/szar/raw/branch/main/src/main/resources/assets/szar/icon.png">

<title>Szar showcase</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<style>
  @font-face {
    font-family: 'Minecraft-Seven';
    src: url('https://tggamesyt.dev/assets/Minecraft-Seven_v2.ttf') format('truetype');
  }

  body {
    background: #0b0b0b url('https://raw.githubusercontent.com/PrismarineJS/minecraft-assets/master/data/1.21.8/blocks/grass_block_side.png') no-repeat center center;
    background-size: cover;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    color: #f5f5dc;
    font-family: 'Minecraft-Seven', monospace;
    padding: 20px;
    margin: 0;
  }

  .container {
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border: 4px solid #f2d16b;
    border-radius: 10px;
    max-width: 800px;
    margin: 40px auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    overflow-wrap: break-word;
    word-wrap: break-word;
  }

  .top-row {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  a.button {
    display: inline-block;
    padding: 14px 28px;
    background: #f2d16b;
    color: #ffffff;
    text-decoration: none;
    font-weight: bold;
    border: 3px solid #333;
    border-radius: 6px;
    text-shadow: 1px 1px #222;
    transition: all 0.2s;
    font-size: 1rem;
    white-space: nowrap;
  }

  a.button:hover {
    background: #e0c34b;
    transform: translateY(-2px);
  }

  #download-count {
    font-size: 0.9rem;
    color: #aaa;
  }

  #download-count span {
    color: #f2d16b;
    font-size: 1.1rem;
  }

  #readme {
    font-size: 1rem;
    line-height: 1.6;
    margin-top: 20px;
  }

  #readme h1, #readme h2, #readme h3 {
    color: #f2d16b;
  }

  #readme img {
    max-width: 100%;
    display: block;
    margin: 12px auto;
    border-radius: 6px;
  }

  #readme ul, #readme ol {
    padding-left: 1.5em;
  }

  #readme a {
    color: #f2d16b;
  }

  #readme code {
    background: rgba(255,255,255,0.1);
    padding: 2px 5px;
    border-radius: 3px;
  }

  #debug {
    margin-top: 16px;
    padding: 10px;
    background: rgba(255,0,0,0.1);
    border: 1px solid #f55;
    border-radius: 6px;
    font-size: 0.75rem;
    color: #f99;
    display: none;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>

<body>
<div class="container">
  <div class="top-row">
    <a id="download-button" class="button" href="#">⏳ Loading...</a>
    <div id="download-count"></div>
  </div>

  <div id="readme">
    <p>Loading README...</p>
  </div>

  <div id="debug"></div>
</div>

<script>
  const BASE    = "https://gitea.tggamesyt.dev/api/v1";
  const OWNER   = "tggamesyt";
  const REPO    = "szar";
  const GITHUB_OFFSET = 51;

  function log(msg) {
    const el = document.getElementById('debug');
    el.style.display = 'block';
    el.textContent += msg + '\n';
  }

  async function fetchLatestJar() {
    try {
      const res = await fetch(`${BASE}/repos/${OWNER}/${REPO}/releases`);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

      const releases = await res.json();
      if (!Array.isArray(releases) || releases.length === 0) {
        document.getElementById('download-button').textContent = 'No releases yet';
        return;
      }

      const totalDownloads = releases.reduce((sum, release) => {
        return sum + (release.assets || []).reduce((s, a) => s + (a.download_count || 0), 0);
      }, 0) + GITHUB_OFFSET;

      document.getElementById('download-count').innerHTML =
        `⬇ <span>${totalDownloads.toLocaleString()}</span> total downloads`;

      const latest = releases[0];
      const jar = latest.assets
        ?.filter(a => a.name.endsWith('.jar') && !a.name.endsWith('-sources.jar'))
        .sort((a, b) => b.size - a.size)[0];

      const button = document.getElementById('download-button');
      if (!jar) {
        button.style.display = 'none';
        return;
      }

      button.href = jar.browser_download_url;
      button.textContent = `⬇ ${jar.name}`;
    } catch (err) {
      document.getElementById('download-button').textContent = '❌ Error loading download';
      log(`fetchLatestJar failed: ${err.message}`);
    }
  }

  async function fetchReadme() {
    try {
      // Use the API contents endpoint instead of raw — API always has CORS headers
      const res = await fetch(`${BASE}/repos/${OWNER}/${REPO}/contents/README.md`);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

      const data = await res.json();
      // Content is base64 encoded, decode it
      const markdown = atob(data.content.replace(/\n/g, ''));
      document.getElementById('readme').innerHTML = marked.parse(markdown);
    } catch (err) {
      document.getElementById('readme').innerHTML = '<p>Failed to load README.</p>';
      log(`fetchReadme failed: ${err.message}`);
    }
  }

  fetchLatestJar();
  fetchReadme();
</script>
</body>
</html>
